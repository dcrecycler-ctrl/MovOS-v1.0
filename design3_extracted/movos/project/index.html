<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MovOS · Tablero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; height:100%; background:#1a1815; overflow:hidden; font-family:'DM Mono','Courier New',monospace; }
    #root { width:100%; height:100%; }
    /* MovOS-scoped scrollbars inside artboard panels */
    .dc-card *::-webkit-scrollbar { width:4px; height:4px; }
    .dc-card *::-webkit-scrollbar-track { background:#0d0d0d; }
    .dc-card *::-webkit-scrollbar-thumb { background:#222; }
    @keyframes movos-pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.35; }
    }
  </style>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#080808"/>
      <rect x="10" y="42" width="80" height="2" fill="#C8A96E"/>
      <text x="50" y="38" text-anchor="middle" font-family="Bebas Neue,Impact" font-size="22" letter-spacing="2" fill="#C8A96E">MovOS</text>
      <text x="50" y="60" text-anchor="middle" font-family="DM Mono,monospace" font-size="6" letter-spacing="2" fill="#7EB8C9">FLEET · OS</text>
    </svg>
  </template>
</head>
